name: PWA Smoke

on:
  pull_request:
    paths:
      - 'apps/pwa/**'
      - '.github/workflows/pwa-smoke.yml'
      - '.github/workflows/pwa-checks.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'apps/pwa/**'
      - '.github/workflows/pwa-smoke.yml'
      - '.github/workflows/pwa-checks.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm exec --workspace @buildonphone/pwa -- playwright install --with-deps chromium

      - name: Run PWA smoke test
        env:
          NEXT_PUBLIC_FAKE_GENERATION: '1'
        run: npm run smoke --workspace @buildonphone/pwa

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/pwa/playwright-report
            apps/pwa/test-results
          if-no-files-found: ignore
